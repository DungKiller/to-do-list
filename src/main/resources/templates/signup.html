<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký Tài Khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Đăng ký tài khoản</h1>
    <p style="color:red" th:if="${error}" th:text="${error}"></p>
    <form th:action="@{/signup}" method="post" th:object="${userDto}">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" th:field="*{username}">
        <span style="color:red" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
        <br>
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" th:field="*{password}">
        <span style="color:red" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
        <br>
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Enter your Password" th:field="*{confirmPassword}">
        <span style="color:red" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
        <br>
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" placeholder="Enter your fullname" th:field="*{fullname}">
        <span style="color:red" th:if="${#fields.hasErrors('fullname')}" th:errors="*{fullname}"></span>
        <br>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" th:field="*{email}">
        <span style="color:red" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        <br>
        <button type="submit">Signup</button>
        <a th:href="@{/}">
            <button type="button">Cancel</button>
        </a>
    </form>
</body>
</html>
