<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - ToDoList</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .card-header {
            background: linear-gradient(135deg, #e91e63 0%, #f06292 100%);
            color: white;
            text-align: center;
            padding: 2.5rem;
            border-bottom: none;
        }

        .card-body {
            padding: 3rem;
        }

        .form-control {
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            padding: 0.875rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #e91e63;
            box-shadow: 0 0 0 0.2rem rgba(233, 30, 99, 0.15);
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, #e91e63 0%, #f06292 100%);
            border: none;
            border-radius: 12px;
            padding: 0.875rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(233, 30, 99, 0.4);
        }

        .btn-secondary {
            border-radius: 12px;
            padding: 0.875rem;
            font-weight: 600;
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            color: #6c757d;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #e9ecef;
            border-color: #adb5bd;
            transform: translateY(-2px);
        }

        .text-link {
            color: #e91e63;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .text-link:hover {
            color: #c2185b;
            text-decoration: underline;
        }

        .alert {
            border-radius: 12px;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .text-danger {
            font-size: 0.875rem;
            color: #dc3545 !important;
        }

        .form-label {
            font-weight: 600;
            color: #424242;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card">
                    <div class="card-header">
                        <h2 class="mb-0">Đăng Ký Tài Khoản</h2>
                        <p class="mb-0">Tạo tài khoản mới cho ToDoList</p>
                    </div>
                    <div class="card-body">
                        <div th:if="${error}" class="alert alert-danger" role="alert">
                            <span th:text="${error}"></span>
                        </div>
                        <form th:action="@{/signup}" method="post" th:object="${userDto}">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="username" class="form-label fw-bold">Tên đăng nhập</label>
                                    <input type="text" id="username" th:field="*{username}" class="form-control"
                                        placeholder="Nhập tên đăng nhập" required>
                                    <div class="text-danger" th:if="${#fields.hasErrors('username')}"
                                        th:errors="*{username}"></div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="fullname" class="form-label fw-bold">Họ và tên</label>
                                    <input type="text" id="fullname" th:field="*{fullname}" class="form-control"
                                        placeholder="Nhập họ và tên" required>
                                    <div class="text-danger" th:if="${#fields.hasErrors('fullname')}"
                                        th:errors="*{fullname}"></div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold">Email</label>
                                <input type="email" id="email" th:field="*{email}" class="form-control"
                                    placeholder="Nhập email" required>
                                <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="password" class="form-label fw-bold">Mật khẩu</label>
                                    <input type="password" id="password" th:field="*{password}" class="form-control"
                                        placeholder="Nhập mật khẩu" required>
                                    <div class="text-danger" th:if="${#fields.hasErrors('password')}"
                                        th:errors="*{password}"></div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="confirmPassword" class="form-label fw-bold">Xác nhận mật khẩu</label>
                                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                                        class="form-control" placeholder="Nhập lại mật khẩu" required>
                                    <div class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}"
                                        th:errors="*{confirmPassword}"></div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success w-100 mb-3">Đăng Ký</button>
                            <div class="text-center">
                                <a href="/" class="text-link">Quay lại đăng nhập</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
