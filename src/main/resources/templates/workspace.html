<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Không Gian Làm Việc - ToDoList</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: linear-gradient(135deg, #2196f3 0%, #21cbf3 100%);
            box-shadow: 0 4px 20px rgba(33, 150, 243, 0.3);
        }
        .navbar-brand {
            font-weight: bold;
            color: white !important;
        }
        .btn-outline-danger {
            border-color: white;
            color: white;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-outline-danger:hover {
            background-color: white;
            color: #dc3545;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        .card-body {
            padding: 2.5rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #2196f3 0%, #21cbf3 100%);
            border: none;
            border-radius: 12px;
            padding: 0.875rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(33, 150, 243, 0.4);
        }
        .btn-danger {
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-danger:hover {
            transform: translateY(-2px);
        }
        .badge {
            font-size: 0.8rem;
            padding: 0.6rem 0.9rem;
            border-radius: 20px;
            font-weight: 500;
        }
        .alert {
            border-radius: 15px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .modal-content {
            border-radius: 20px;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .modal-header {
            background: linear-gradient(135deg, #2196f3 0%, #21cbf3 100%);
            color: white;
            border-bottom: none;
            border-radius: 20px 20px 0 0;
        }
        .modal-body {
            padding: 2.5rem;
        }
        .form-control {
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            padding: 0.875rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #2196f3;
            box-shadow: 0 0 0 0.2rem rgba(33, 150, 243, 0.15);
            transform: translateY(-2px);
        }
        .btn-success {
            background: linear-gradient(135deg, #2196f3 0%, #21cbf3 100%);
            border: none;
            border-radius: 12px;
            padding: 0.875rem 1.5rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
            transition: all 0.3s ease;
        }
        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(33, 150, 243, 0.4);
        }
        .btn-secondary {
            border-radius: 12px;
            padding: 0.875rem 1.5rem;
            font-weight: 600;
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            color: #6c757d;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background: #e9ecef;
            border-color: #adb5bd;
            transform: translateY(-2px);
        }
        .form-label {
            font-weight: 600;
            color: #424242;
            margin-bottom: 0.5rem;
        }
        h1 {
            color: #424242;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">ToDoList</a>
            <div class="d-flex">
                <a href="/logout" class="btn btn-outline-danger">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h2 mb-0">Không Gian Làm Việc</h1>
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createWorkspaceModal">
                <i class="bi bi-plus-lg"></i> Tạo Workspace Mới
            </button>
        </div>

        <div class="modal fade" id="createWorkspaceModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Tạo Không Gian Làm Việc Mới</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/workspace/create}" method="post">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="name" class="form-label fw-bold">Tên Workspace</label>
                                <input type="text" id="name" name="name" class="form-control" placeholder="Nhập tên nhóm..." required>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-success">Xác Nhận Tạo</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(workspaces)}" class="alert alert-info text-center" role="alert">
            <h4 class="alert-heading">Chưa có workspace nào!</h4>
            <p>Bạn chưa tham gia không gian làm việc nào. Hãy tạo mới nhé!</p>
            <hr>
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createWorkspaceModal">
                Tạo Workspace Đầu Tiên
            </button>
        </div>

        <div class="row mt-4">
            <div class="col-md-4 mb-4" th:each="w : ${workspaces}">
                <div class="card h-100">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">
                            <a th:href="@{|/workspace/${w.workspaceId}/task|}"
                               th:text="${w.name}"
                               class="text-decoration-none text-dark fw-bold">
                                Tên Workspace
                            </a>
                        </h5>
                        <p class="card-text text-muted mb-2">ID: <span th:text="${w.workspaceId}"></span></p>
                        <p class="card-text mb-auto">
                            <span th:if="${session.user.userId == w.owner.userId}" class="badge bg-danger">
                                Chủ phòng
                            </span>
                            <span th:unless="${session.user.userId == w.owner.userId}" class="badge bg-info text-dark">
                                Thành viên
                            </span>
                        </p>
                        <div th:if="${session.user.userId == w.owner.userId}" class="mt-3">
                            <form th:action="@{/workspace/delete}" method="post" style="display: inline;">
                                <input type="hidden" name="workspaceId" th:value="${w.workspaceId}">
                                <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Bạn có chắc muốn xóa workspace này?')">Xóa</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
