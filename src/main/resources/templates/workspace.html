<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Không Gian Làm Việc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <h1>Không gian làm việc</h1>
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createWorkspaceModal">
        + Tạo Workspace mới
    </button>

    <div class="modal fade" id="createWorkspaceModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Tạo không gian làm việc mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/workspace/create}" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="name" class="form-label">Tên Workspace</label>
                            <input type="text" id="name" name="name" class="form-control" placeholder="Nhập tên nhóm..." required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-success">Xác nhận tạo</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(workspaces)}" class="alert alert-warning">
        Bạn chưa tham gia không gian làm việc nào. Hãy tạo mới nhé!
    </div>

    <div class="row mt-4">
        <div class="col-md-4 mb-3" th:each="w : ${workspaces}">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">
                        <a th:href="@{|/workspace/${w.workspaceId}/task|}"
                           th:text="${w.name}"
                           class="text-decoration-none">
                            Tên Workspace
                        </a>
                    </h5>
                    <p class="card-text text-muted">ID: <span th:text="${w.workspaceId}"></span></p>
                    <p class="card-text">
                        <span th:if="${session.user.userId == w.owner.userId}" class="badge bg-danger">
                            Chủ phòng
                        </span>

                        <span th:unless="${session.user.userId == w.owner.userId}" class="badge bg-info text-dark">
                            Thành viên
                        </span>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
