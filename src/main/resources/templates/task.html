<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Công Việc - ToDoList</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .breadcrumb {
            background: transparent;
            font-size: 0.9rem;
        }
        .breadcrumb-item + .breadcrumb-item::before {
            content: ">";
        }
        .btn-primary {
            background: linear-gradient(135deg, #2196f3 0%, #21cbf3 100%);
            border: none;
            border-radius: 12px;
            padding: 0.875rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(33, 150, 243, 0.4);
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
        }
        .table {
            border-radius: 20px;
            overflow: hidden;
        }
        .table thead th {
            background: linear-gradient(135deg, #2196f3 0%, #21cbf3 100%);
            color: white;
            border: none;
            font-weight: 600;
            padding: 1.25rem;
        }
        .table tbody tr {
            transition: all 0.3s ease;
        }
        .badge {
            font-size: 0.8rem;
            padding: 0.6rem 0.9rem;
            border-radius: 20px;
            font-weight: 500;
        }
        .btn-outline-primary {
            border-color: #2196f3;
            color: #2196f3;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-outline-primary:hover {
            background-color: #2196f3;
            border-color: #2196f3;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }
        .btn-outline-danger {
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-outline-danger:hover {
            transform: translateY(-2px);
        }
        .modal-content {
            border-radius: 20px;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .modal-header {
            background: linear-gradient(135deg, #2196f3 0%, #21cbf3 100%);
            color: white;
            border-bottom: none;
            border-radius: 20px 20px 0 0;
        }
        .modal-header.bg-warning {
            background: linear-gradient(135deg, #ff9800 0%, #ffb74d 100%) !important;
        }
        .modal-body {
            padding: 2.5rem;
        }
        .form-control {
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            padding: 0.875rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #2196f3;
            box-shadow: 0 0 0 0.2rem rgba(33, 150, 243, 0.15);
            transform: translateY(-2px);
        }
        .btn-success {
            background: linear-gradient(135deg, #2196f3 0%, #21cbf3 100%);
            border: none;
            border-radius: 12px;
            padding: 0.875rem 1.5rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
            transition: all 0.3s ease;
        }
        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(33, 150, 243, 0.4);
        }
        .btn-warning {
            background: linear-gradient(135deg, #ff9800 0%, #ffb74d 100%);
            border: none;
            border-radius: 12px;
            padding: 0.875rem 1.5rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
            transition: all 0.3s ease;
        }
        .btn-warning:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 152, 0, 0.4);
        }
        .btn-secondary {
            border-radius: 12px;
            padding: 0.875rem 1.5rem;
            font-weight: 600;
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            color: #6c757d;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background: #e9ecef;
            border-color: #adb5bd;
            transform: translateY(-2px);
        }
        .avatar-circle {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2196f3 0%, #21cbf3 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            margin-right: 12px;
            box-shadow: 0 4px 10px rgba(33, 150, 243, 0.3);
        }
        .alert {
            border-radius: 15px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .priority-high { color: #f44336; font-weight: bold; }
        .priority-medium { color: #ff9800; font-weight: bold; }
        .priority-low { color: #4caf50; font-weight: bold; }
        .form-label {
            font-weight: 600;
            color: #424242;
            margin-bottom: 0.5rem;
        }
        h1 {
            color: #424242;
            font-weight: 700;
        }
        .sidebar {
            background: linear-gradient(135deg, #ffffff 0%, #e3f2fd 100%);
            border-radius: 0;
            padding: 1.5rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 20%;
            overflow-y: auto;
            z-index: 1000;
        }
        .sidebar .nav-link {
            color: #424242;
            font-weight: 500;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin-bottom: 0.25rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
        }
        .sidebar .nav-link:hover {
            background-color: rgba(33, 150, 243, 0.15);
            color: #1976d2;
            transform: translateX(5px) translateY(-5px);
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }
        .main-content {
            margin-left: 20%;
            padding: 1.5rem;
        }
        @media (max-width: 768px) {
            .sidebar {
                position: static;
                height: auto;
                width: 100%;
                border-radius: 20px;
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div th:if="${error}" class="alert alert-danger text-center" role="alert">
            <span th:text="${error}"></span>
        </div>
        <div th:if="${message}" class="alert alert-success text-center" role="alert">
            <span th:text="${message}"></span>
        </div>
        <div class="sidebar">
            <h5><i class="bi bi-list"></i> Không gian của bạn</h5>
            <nav class="nav flex-column">
                <div class="nav flex-column ms-3">
                    <a th:each="w : ${workspaces}" class="nav-link" th:href="@{/workspace/{id}/task(id=${w.workspaceId})}" th:classappend="${w.workspaceId == currentWorkspaceId} ? 'active' : ''">
                        <i class="bi bi-folder"></i> <span th:text="${w.name}"></span>
                    </a>
                </div>
            </nav>
        </div>
        <div class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a th:href="@{/workspace}" class="text-decoration-none">Workspace</a></li>
                            <li class="breadcrumb-item active" aria-current="page" th:text="${workspace.name}">Tên nhóm</li>
                        </ol>
                    </nav>
                    <h1 class="h2 fw-bold" th:text="${workspace.name}"></h1>
                </div>
                <button type="button" class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addTaskModal">
                    <i class="bi bi-plus-lg"></i> Thêm Công Việc Mới
                </button>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th style="width: 25%">Công Việc</th>
                            <th style="width: 20%">Người Thực Hiện</th>
                            <th style="width: 15%">Độ Ưu Tiên</th>
                            <th style="width: 15%">Hạn Chót</th>
                            <th style="width: 15%">Trạng Thái</th>
                            <th style="width: 10%">Thao Tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="t : ${tasks}">
                            <td>
                                <div th:text="${t.title}" class="fw-bold"></div>
                                <small class="text-muted" th:text="${t.note}"></small>
                            </td>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="avatar-circle"
                                         th:text="${t.user != null ? #strings.substring(t.user.fullname,0,1) : '?'}">
                                    </div>
                                    <span th:text="${t.user != null ? t.user.fullname : 'Chưa giao'}"></span>
                                </div>
                            </td>
                            <td>
                                <span th:text="${t.priority}"
                                      th:class="${t.priority == 'High' ? 'priority-high' : (t.priority == 'Medium' ? 'priority-medium' : 'priority-low')}">
                                </span>
                            </td>
                            <td th:text="${#temporals.format(t.endDate, 'dd/MM/yyyy')}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${t.status == 'Hoàn thành' ? 'bg-success' : 'bg-warning text-dark'}"
                                      th:text="${t.status}">
                                </span>
                            </td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary edit-btn"
                                        data-bs-toggle="modal"
                                        data-bs-target="#editTaskModal"
                                        th:data-taskid="${t.taskId}"
                                        th:data-title="${t.title}"
                                        th:data-priority="${t.priority}"
                                        th:data-status="${t.status}"
                                        th:data-enddate="${#temporals.format(t.endDate, 'yyyy-MM-dd')}"
                                        th:data-note="${t.note}"
                                        th:data-email="${t.user != null ? t.user.email : ''}">
                                    Sửa
                                </button>
                                <form th:action="@{/task/delete}" method="post" style="display: inline;">
                                    <input type="hidden" name="taskId" th:value="${t.taskId}">
                                    <input type="hidden" name="workspaceId" th:value="${workspace.workspaceId}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Bạn có chắc muốn xóa task này?')">Xóa</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(tasks)}">
                            <td colspan="6" class="text-center py-5 text-muted">
                                <img src="https://cdn-icons-png.flaticon.com/512/5058/5058436.png" width="80" class="mb-3" style="opacity: 0.5;" alt="No tasks">
                                <br>
                                <h5>Chưa Có Công Việc Nào!</h5>
                                <p>Hãy bắt đầu tạo task đầu tiên.</p>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="modal fade" id="addTaskModal" tabindex="-1" aria-labelledby="addTaskModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="addTaskModalLabel">Tạo Công Việc Mới</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/task/create}" method="post">
                        <div class="modal-body">
                            <input type="hidden" name="workspaceId" th:value="${workspace.workspaceId}">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên Công Việc</label>
                                <input type="text" name="title" class="form-control" required placeholder="Ví dụ: Thiết kế giao diện...">
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Độ Ưu Tiên</label>
                                    <select name="priority" class="form-select">
                                        <option value="Low">Thấp</option>
                                        <option value="Medium" selected>Trung Bình</option>
                                        <option value="High">Cao</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Trạng Thái</label>
                                    <select name="status" class="form-select">
                                        <option value="Chưa xong" selected>Chưa Xong</option>
                                        <option value="Hoàn thành">Hoàn Thành</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Hạn Chót</label>
                                <input type="date" name="endDate" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Ghi Chú</label>
                                <textarea name="note" class="form-control" rows="3" placeholder="Mô tả chi tiết công việc..."></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Người Thực Hiện</label>
                                <input type="email" name="email" class="form-control" placeholder="Nhập email..." required>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-success">Lưu Công Việc</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="modal fade" id="editTaskModal" tabindex="-1" aria-labelledby="editTaskModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content">
                    <div class="modal-header bg-warning">
                        <h5 class="modal-title" id="editTaskModalLabel">Chỉnh Sửa Công Việc</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/task/update}" method="post" id="editTaskForm">
                        <div class="modal-body">
                            <input type="hidden" name="taskId" id="editTaskId">
                            <input type="hidden" name="workspaceId" th:value="${workspace.workspaceId}">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên Công Việc</label>
                                <input type="text" name="title" id="editTitle" class="form-control" required placeholder="Ví dụ: Thiết kế giao diện...">
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Độ Ưu Tiên</label>
                                    <select name="priority" id="editPriority" class="form-select">
                                        <option value="Low">Thấp</option>
                                        <option value="Medium">Trung Bình</option>
                                        <option value="High">Cao</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Trạng Thái</label>
                                    <select name="status" id="editStatus" class="form-select">
                                        <option value="Chưa xong">Chưa Xong</option>
                                        <option value="Hoàn thành">Hoàn Thành</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Hạn Chót</label>
                                <input type="date" name="endDate" id="editEndDate" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Ghi Chú</label>
                                <textarea name="note" id="editNote" class="form-control" rows="3" placeholder="Mô tả chi tiết công việc..."></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Người Thực Hiện</label>
                                <input type="email" name="email" id="editEmail" class="form-control" placeholder="Nhập email..." required>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-warning">Cập Nhật Công Việc</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.edit-btn').forEach(button => {
            button.addEventListener('click', function() {
                const taskId = this.getAttribute('data-taskid');
                const title = this.getAttribute('data-title');
                const priority = this.getAttribute('data-priority');
                const status = this.getAttribute('data-status');
                const endDate = this.getAttribute('data-enddate');
                const note = this.getAttribute('data-note');
                const email = this.getAttribute('data-email');

                document.getElementById('editTaskId').value = taskId;
                document.getElementById('editTitle').value = title;
                document.getElementById('editPriority').value = priority;
                document.getElementById('editStatus').value = status;
                document.getElementById('editEndDate').value = endDate;
                document.getElementById('editNote').value = note;
                document.getElementById('editEmail').value = email;
            });
        });
    </script>
</body>
</html>
