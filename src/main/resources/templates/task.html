<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Chi Tiết Công Việc</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <style>
            .priority-high { color: #dc3545; font-weight: bold; }
            .priority-medium { color: #ffc107; font-weight: bold; }
            .priority-low { color: #0dcaf0; font-weight: bold; }
            .avatar-circle {
                width: 30px; height: 30px;
                background-color: #6c757d;
                color: white;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                margin-right: 10px;
            }
        </style>
    </head>
    <body class="bg-light">

        <div class="container mt-5">
            <p style="color:red" th:if="${error}" th:text="${error}"></p>
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a th:href="@{/workspace}">Workspace</a></li>
                            <li class="breadcrumb-item active" aria-current="page" th:text="${workspace.name}">Tên nhóm</li>
                        </ol>
                    </nav>
                    <h1 class="h2" th:text="${workspace.name}"></h1>
                </div>
                <button type="button" class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addTaskModal">
                    <i class="bi bi-plus-lg"></i> + Thêm công việc mới
                </button>

                <div class="modal fade" id="addTaskModal" tabindex="-1" aria-labelledby="addTaskModalLabel" aria-hidden="true">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-header bg-primary text-white">
                                <h5 class="modal-title" id="addTaskModalLabel">Tạo công việc mới</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>

                            <form th:action="@{/task/create}" method="post">
                                <div class="modal-body">
                                    <input type="hidden" name="workspaceId" th:value="${workspace.workspaceId}">

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Tên công việc</label>
                                        <input type="text" name="title" class="form-control" required placeholder="Ví dụ: Thiết kế giao diện...">
                                    </div>

                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label fw-bold">Độ ưu tiên</label>
                                            <select name="priority" class="form-select">
                                                <option value="Low">Thấp</option>
                                                <option value="Medium" selected>Trung bình</option>
                                                <option value="High">Cao</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label fw-bold">Trạng thái</label>
                                            <select name="status" class="form-select">
                                                <option value="Not Started">Chưa bắt đầu</option>
                                                <option value="In Progress">Đang diễn ra</option>
                                                <option value="Done">Hoàn thành</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Hạn chót</label>
                                        <input type="date" name="endDate" class="form-control" required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Ghi chú</label>
                                        <textarea name="note" class="form-control" rows="3" placeholder="Mô tả chi tiết công việc..."></textarea>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Người thực hiện</label>
                                        <input type="text" name="username" class="form-control" placeholder="Nhập username..." required>
                                    </div>
                                </div>
                                <div class="modal-footer bg-light">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                                    <button type="submit" class="btn btn-primary px-4">Lưu Task</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

            </div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th style="width: 25%">Công việc</th>
                            <th style="width: 20%">Người thực hiện</th>
                            <th style="width: 15%">Độ ưu tiên</th>
                            <th style="width: 15%">Hạn chót</th>
                            <th style="width: 15%">Trạng thái</th>
                            <th style="width: 10%">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="t : ${tasks}">
                            <td>
                                <div th:text="${t.title}" class="fw-bold"></div>
                                <small class="text-muted" th:text="${t.note}"></small>
                            </td>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="avatar-circle"
                                         th:text="${t.user != null ? #strings.substring(t.user.fullname,0,1) : '?'}">
                                    </div>
                                    <span th:text="${t.user != null ? t.user.fullname : 'Chưa giao'}"></span>
                                </div>
                            </td>
                            <td>
                                    <span th:text="${t.priority}"
                                          th:class="${t.priority == 'High' ? 'priority-high' : (t.priority == 'Medium' ? 'priority-medium' : 'priority-low')}">
                                    </span>
                            </td>
                            <td th:text="${#temporals.format(t.endDate, 'dd/MM/yyyy')}"></td>
                            <td>
                                    <span class="badge"
                                          th:classappend="${t.status == 'Done' ? 'bg-success' : 'bg-warning text-dark'}"
                                          th:text="${t.status}">
                                    </span>
                            </td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary">Sửa</button>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(tasks)}">
                            <td colspan="6" class="text-center py-5 text-muted">
                                <img src="https://cdn-icons-png.flaticon.com/512/5058/5058436.png" width="50" class="mb-3" style="opacity: 0.5;"><br>
                                Chưa có công việc nào trong nhóm này. Hãy bắt đầu tạo task đầu tiên!
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
