<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Đăng nhập</h1>
    <p style="color:red" th:if="${error}" th:text="${error}"></p>
    <p style="color:green" th:if="${message}" th:text="${message}"></p>
    <form th:action="@{/login}" method="post">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Nhập username" required>
        <br>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Nhập password" required>
        <br>
        <button type="submit">Login</button>
        <p>Chưa có tài khoản??? <span><a th:href="@{/signup}">Signup</a></span></p>
    </form>
</body>
</html>
